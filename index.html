<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campeonato Maratón SC | Página de torneo</title>
    <meta
      name="description"
      content="Página pública del campeonato de fútbol sala Maratón SC."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&family=Barlow+Condensed:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-header">
        <img class="brand-logo" src="assets/logo.jpg" alt="Logo de Maratón SC" />
        <p class="brand">Maratón SC</p>
      </div>
      <h1>Campeonato de Fútbol Sala</h1>
      <p class="sync">
        <span id="sync-state">Sincronizado</span>
        <span id="sync-time">-</span>
      </p>
    </header>

    <nav class="menu" aria-label="Navegación principal">
      <a href="#inicio" class="menu-link is-active" data-section="inicio">Inicio</a>
      <a href="#grupos" class="menu-link" data-section="grupos">Fase de grupos</a>
      <a href="#eliminatoria" class="menu-link" data-section="eliminatoria">Fase eliminatoria</a>
    </nav>

    <main>
      <section id="inicio" class="panel section-page is-visible">
        <h2>Inicio</h2>
        <article class="info-grid">
          <div>
            <h3>Organización</h3>
            <p id="event-organization">-</p>
          </div>
          <div>
            <h3>Lugar</h3>
            <p id="event-location">-</p>
          </div>
          <div>
            <h3>Fecha del evento</h3>
            <p id="event-date">-</p>
          </div>
        </article>
      </section>

      <section id="grupos" class="panel section-page">
        <div class="panel-head">
          <h2>Fase de grupos</h2>
          <button id="refresh-data" type="button">Actualizar datos</button>
        </div>
        <p class="small" id="groups-status">Cargando clasificación de grupos…</p>
        <div id="groups-grid" class="groups-grid"></div>
      </section>

      <section id="eliminatoria" class="panel section-page">
        <div class="panel-head">
          <h2>Fase eliminatoria</h2>
        </div>
        <nav class="elimination-subnav" aria-label="Rondas de la fase eliminatoria">
          <button type="button" class="elimination-tab is-active" data-round="quarter">Cuartos de final</button>
          <button type="button" class="elimination-tab" data-round="semi">Semifinal</button>
          <button type="button" class="elimination-tab" data-round="final">Final</button>
        </nav>
        <div id="elimination-rounds" class="elimination-rounds"></div>
      </section>
    </main>

    <footer>
      Todos los derechos reservados © Maratón SC.
    </footer>

    <script>
      const UI = {
        dataFile: "data/maratonsc-data.json",
        refreshMs: 15000,
        syncState: document.getElementById("sync-state"),
        syncTime: document.getElementById("sync-time"),
        groupsGrid: document.getElementById("groups-grid"),
        eliminationRounds: document.getElementById("elimination-rounds"),
        groupsStatus: document.getElementById("groups-status"),
        eventOrganization: document.getElementById("event-organization"),
        eventLocation: document.getElementById("event-location"),
        eventDate: document.getElementById("event-date"),
        refreshBtn: document.getElementById("refresh-data"),
        eliminationTabs: document.querySelectorAll(".elimination-tab"),
        sections: document.querySelectorAll(".section-page"),
        menuLinks: document.querySelectorAll(".menu-link"),
      };

      let activeEliminationRound = "quarter";
      let eliminationData = {
        quarterFinals: [],
        semiFinals: [],
        finals: [],
      };

      const toText = (value) => String(value || "").trim();

      const hasValue = (value) => {
        const text = toText(value).toUpperCase();
        return text.length > 0 && text !== "TBD";
      };

      const scoreValue = (value) => {
        const n = Number(value);
        return Number.isFinite(n) ? Math.trunc(n) : null;
      };

      const pickField = (obj = {}, keys = [], fallback = undefined) => {
        for (const key of keys) {
          if (Object.prototype.hasOwnProperty.call(obj, key)) return obj[key];
        }
        return fallback;
      };

      const normalizeMatch = (match = {}, fallback) => {
        const rawStatus = toText(pickField(match, ["estado", "status"], "Programado"));
        const partido = toText(
          pickField(match, ["partido", "id", "matchId", "encuentro"], fallback?.partido || ""),
        );
        const local = pickField(match, ["local", "teamHome", "equipoLocal", "home"], fallback?.home || "");
        const visitante = pickField(
          match,
          ["visitante", "teamAway", "equipoVisitante", "away"],
          fallback?.away || "",
        );
        const golesLocal = scoreValue(pickField(match, ["golesLocal", "scoreHome", "golesCasa"], null));
        const golesVisitante = scoreValue(
          pickField(match, ["golesVisitante", "scoreAway", "golesFuera"], null),
        );
        const horario = toText(pickField(match, ["hora", "time", "horario"], ""));
        const safe = {
          ...match,
          partido,
          local: hasValue(local) ? toText(local) : fallback?.home || "",
          visitante: hasValue(visitante) ? toText(visitante) : fallback?.away || "",
          golesLocal,
          golesVisitante,
          estado: rawStatus || "Programado",
          hora: horario,
        };

        safe.played = safe.golesLocal !== null && safe.golesVisitante !== null;

        if (safe.golesLocal > safe.golesVisitante) {
          safe.winner = safe.local;
          safe.loser = safe.visitante;
        } else if (safe.golesLocal < safe.golesVisitante) {
          safe.winner = safe.visitante;
          safe.loser = safe.local;
        } else if (safe.played) {
          safe.winner = "Empate";
          safe.loser = "Empate";
        } else {
          safe.winner = null;
          safe.loser = null;
        }

        return safe;
      };

      const matchInfoLabel = (match) => {
        if (match.estado === "Finalizado") {
          if (match.golesLocal === null && match.golesVisitante === null) return "Sin resultado";
          return `${match.golesLocal} - ${match.golesVisitante}`;
        }
        if (match.estado === "Disputando") {
          if (match.golesLocal === null && match.golesVisitante === null) return "Sin resultado";
          return `${match.golesLocal} - ${match.golesVisitante}`;
        }
        return "Programado";
      };

      const matchTimeLabel = (match) => {
        if (hasValue(match.hora)) return toText(match.hora);
        return "Sin horario definido";
      };

      const teamPoints = (value) => {
        const n = Number(value);
        return Number.isFinite(n) ? Math.trunc(n) : 0;
      };

      const teamName = (teamObj = {}) => {
        return toText(
          pickField(teamObj, ["nombre", "name", "equipo", "team"], "Sin nombre"),
        );
      };

      const buildQualificationMap = (groups = {}) => {
        const rankedByGroup = {};
        const allTeams = [];

        ["A", "B", "C"].forEach((groupCode) => {
          const teams = Array.isArray(groups[groupCode]) ? groups[groupCode] : [];
        const normalized = teams
          .map((teamObj, index) => ({
            name: teamName(teamObj),
            points: teamPoints(pickField(teamObj, ["puntos", "points"], 0)),
            group: groupCode,
            index,
            qualify: null,
          }))
            .sort((a, b) => {
              if (b.points !== a.points) return b.points - a.points;
              return a.name.localeCompare(b.name);
            });

          normalized.forEach((team, position) => {
            team.qualify = position < 2 ? "directo" : null;
          });

          rankedByGroup[groupCode] = normalized;
          allTeams.push(...normalized);
        });

        allTeams
          .filter((team) => team.qualify === null)
          .sort((a, b) => {
            if (b.points !== a.points) return b.points - a.points;
            if (a.group !== b.group) return a.group.localeCompare(b.group);
            return a.index - b.index;
          })
          .slice(0, 2)
          .forEach((team) => {
            team.qualify = "repechaje";
          });

        return rankedByGroup;
      };

      const buildGroupTable = (teams = []) => {
        const table = document.createElement("table");
        table.innerHTML = `
          <thead>
            <tr><th>Equipo</th><th>Puntos</th></tr>
          </thead>
        `;

        const body = document.createElement("tbody");

        teams.forEach((teamObj = {}) => {
          const tr = document.createElement("tr");
          if (teamObj.qualify === "directo") tr.className = "team-qualified direct";
          if (teamObj.qualify === "repechaje") tr.className = "team-qualified repechage";
          if (teamObj.qualify === null) tr.className = "team-qualified eliminated";

          tr.innerHTML = `<td>${teamObj.name}</td><td>${teamObj.points}</td>`;
          body.appendChild(tr);
        });

        if (teams.length === 0) {
          const tr = document.createElement("tr");
          tr.className = "muted";
          tr.innerHTML = `<td colspan="2">Sin equipos definidos</td>`;
          body.appendChild(tr);
        }

        table.appendChild(body);
        return table;
      };

      const renderGroups = (groups = {}) => {
        UI.groupsGrid.replaceChildren();
        const qualifiedGroups = buildQualificationMap(groups);

        ["A", "B", "C"].forEach((groupCode) => {
          const teams = qualifiedGroups[groupCode] || [];
          const card = document.createElement("div");
          card.className = "group-card";
          card.innerHTML = `<h3>Grupo ${groupCode}</h3>`;
          card.appendChild(buildGroupTable(teams));
          UI.groupsGrid.appendChild(card);
        });

        UI.groupsStatus.textContent = "Clasificación de grupos actualizada.";
      };

      const buildMatchRow = (match = {}) => {
        const tr = document.createElement("tr");
        tr.className = `match-row ${match.estado || "Programado"}`;
        tr.innerHTML = `
          <td data-label="Equipo 1">${match.local}</td>
          <td data-label="Equipo 2">${match.visitante}</td>
          <td data-label="Horario">${matchTimeLabel(match)}</td>
          <td data-label="Resultado">${matchInfoLabel(match)}</td>
          <td data-label="Estado">${toText(match.estado) || "Programado"}</td>
        `;
        return tr;
      };

      const buildMatchTable = (title, matches = []) => {
        const wrapper = document.createElement("section");
        wrapper.className = "round-section";
        wrapper.innerHTML = `<h3>${title}</h3>`;

        const table = document.createElement("table");
        table.className = "round-table";
        table.innerHTML = `
          <thead>
            <tr>
              <th>Equipo 1</th>
              <th>Equipo 2</th>
              <th>Horario</th>
              <th>Resultado</th>
              <th>Estado</th>
            </tr>
          </thead>
        `;

        const body = document.createElement("tbody");

        matches.forEach((match) => body.appendChild(buildMatchRow(match)));
        if (matches.length === 0) {
          const tr = document.createElement("tr");
          tr.className = "muted";
          tr.innerHTML = `<td class="empty-state" colspan="5">Sin partidos cargados.</td>`;
          body.appendChild(tr);
        }

        table.appendChild(body);
        wrapper.appendChild(table);
        return wrapper;
      };

      const renderEliminationRound = (round = "quarter") => {
        const titleMap = {
          quarter: "Cuartos de final",
          semi: "Semifinal",
          final: "Final",
        };

        const activeRound = titleMap[round] ? round : "quarter";
        UI.eliminationRounds.replaceChildren();

        if (activeRound === "quarter") {
          UI.eliminationRounds.appendChild(buildMatchTable(titleMap.quarter, eliminationData.quarterFinals));
        } else if (activeRound === "semi") {
          UI.eliminationRounds.appendChild(buildMatchTable(titleMap.semi, eliminationData.semiFinals));
        } else {
          const [championshipMatch, thirdPlaceMatch] = eliminationData.finals || [];
          UI.eliminationRounds.appendChild(
            buildMatchTable("Partido final del campeonato", championshipMatch ? [championshipMatch] : []),
          );
          UI.eliminationRounds.appendChild(
            buildMatchTable("Partido por 3.º y 4.º puesto", thirdPlaceMatch ? [thirdPlaceMatch] : []),
          );
        }

        UI.eliminationTabs.forEach((tab) => {
          const active = tab.dataset.round === activeRound;
          tab.classList.toggle("is-active", active);
          tab.setAttribute("aria-selected", active ? "true" : "false");
        });

        activeEliminationRound = activeRound;
      };

      const renderElimination = (elimination = {}) => {
        const quarter = Array.isArray(elimination.cuartosDeFinal)
          ? elimination.cuartosDeFinal
          : Array.isArray(elimination.quartersFinals)
            ? elimination.quartersFinals
            : Array.isArray(elimination.quarterFinals)
              ? elimination.quarterFinals
              : [];

        const semi = Array.isArray(elimination.semifinales)
          ? elimination.semifinales
          : Array.isArray(elimination.semiFinals)
            ? elimination.semiFinals
            : Array.isArray(elimination.semis)
              ? elimination.semis
              : [];
        const finalRaw = elimination.final || {};
        const thirdRaw = elimination.tercerPuesto || elimination.thirdPlace || {};

        const qf = [];
        for (let i = 0; i < 4; i += 1) {
          qf[i] = normalizeMatch(quarter[i] || {}, {
            partido: `Q${i + 1}`,
            home: `Q${i + 1} Equipo 1`,
            away: `Q${i + 1} Equipo 2`,
          });
        }

        const qfWinners = qf.map((match, index) => match.winner || `Ganador Q${index + 1}`);

        const sf0raw = semi[0] || {};
        const sf1raw = semi[1] || {};

        const sfLeft = normalizeMatch(sf0raw, {
          partido: "S1",
          home: qfWinners[0],
          away: qfWinners[1],
        });
        const sfRight = normalizeMatch(sf1raw, {
          partido: "S2",
          home: qfWinners[2],
          away: qfWinners[3],
        });

        sfLeft.local = hasValue(sf0raw.local || sf0raw.teamHome) ? sfLeft.local : qfWinners[0];
        sfLeft.visitante = hasValue(sf0raw.visitante || sf0raw.teamAway)
          ? sfLeft.visitante
          : qfWinners[1];
        sfRight.local = hasValue(sf1raw.local || sf1raw.teamHome) ? sfRight.local : qfWinners[2];
        sfRight.visitante = hasValue(sf1raw.visitante || sf1raw.teamAway)
          ? sfRight.visitante
          : qfWinners[3];

        const sfLeftWinner = sfLeft.winner || `Ganador SF1`;
        const sfLeftLoser = sfLeft.loser || `Perdedor SF1`;
        const sfRightWinner = sfRight.winner || `Ganador SF2`;
        const sfRightLoser = sfRight.loser || `Perdedor SF2`;

        const finalMatch = normalizeMatch(finalRaw, {
          partido: "F",
          home: sfLeftWinner,
          away: sfRightWinner,
        });
        finalMatch.local = hasValue(finalRaw.local || finalRaw.teamHome)
          ? finalMatch.local
          : sfLeftWinner;
        finalMatch.visitante = hasValue(finalRaw.visitante || finalRaw.teamAway)
          ? finalMatch.visitante
          : sfRightWinner;

        const thirdMatch = normalizeMatch(thirdRaw, {
          partido: "TP",
          home: sfLeftLoser,
          away: sfRightLoser,
        });
        thirdMatch.local = hasValue(thirdRaw.local || thirdRaw.teamHome)
          ? thirdMatch.local
          : sfLeftLoser;
        thirdMatch.visitante = hasValue(thirdRaw.visitante || thirdRaw.teamAway)
          ? thirdMatch.visitante
          : sfRightLoser;

        eliminationData = {
          quarterFinals: qf,
          semiFinals: [sfLeft, sfRight],
          finals: [finalMatch, thirdMatch],
        };

        renderEliminationRound(activeEliminationRound);
      };

      const renderEventData = (eventData = {}) => {
        UI.eventOrganization.textContent = toText(
          pickField(eventData, ["organizacion", "organization"], "Maratón SC"),
        );
        UI.eventLocation.textContent = toText(
          pickField(
            eventData,
            ["lugar", "location", "direccion"],
            "Cam. Cuenca, 4, 16600 San Clemente, Cuenca.",
          ),
        );
        UI.eventDate.textContent = toText(
          pickField(eventData, ["fecha", "date"], "25 y 26 de Julio"),
        );
      };

      const syncStatus = (ok) => {
        UI.syncState.textContent = ok ? "Sincronizado" : "Sin conexión";
        UI.syncState.classList.toggle("is-ok", ok);
        UI.syncState.classList.toggle("is-error", !ok);
      };

      const updateTimestamp = () => {
        UI.syncTime.textContent = `Última actualización: ${new Date().toLocaleTimeString("es-ES")}`;
      };

      const loadData = async () => {
        try {
          const response = await fetch(`${UI.dataFile}?v=${Date.now()}`, { cache: "no-store" });
          if (!response.ok) throw new Error("No se pudo leer el archivo");
          const raw = await response.json();

          renderEventData(raw.evento || raw.event || {});
          renderGroups(raw.grupos || raw.groups || {});
          renderElimination(raw.eliminatoria || raw.elimination || {});

          syncStatus(true);
          UI.groupsStatus.textContent = "Datos cargados correctamente.";
          updateTimestamp();
        } catch (error) {
          syncStatus(false);
          UI.groupsStatus.textContent = "No se pudo cargar data/maratonsc-data.json";
          console.error(error);
        }
      };

      const activateSection = (id) => {
        UI.sections.forEach((section) => {
          section.classList.toggle("is-visible", section.id === id);
        });

        UI.menuLinks.forEach((link) => {
          const match = link.dataset.section === id;
          link.classList.toggle("is-active", match);
          if (match) {
            link.setAttribute("aria-current", "page");
          } else {
            link.removeAttribute("aria-current");
          }
        });
      };

      UI.menuLinks.forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          const section = link.dataset.section;
          activateSection(section);
          history.replaceState(null, "", `#${section}`);
        });
      });

      UI.eliminationTabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          renderEliminationRound(tab.dataset.round);
        });
      });

      UI.refreshBtn.addEventListener("click", loadData);

      const defaultSection = window.location.hash.replace("#", "") || "inicio";
      activateSection(["inicio", "grupos", "eliminatoria"].includes(defaultSection) ? defaultSection : "inicio");

      loadData();
      setInterval(loadData, UI.refreshMs);
    </script>
  </body>
</html>
